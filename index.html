<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--pri:#00FF87;--bg:#0a1a12;--card:#0d2318;--acc:#00CC6A;--red:#FF6B6B;--yel:#FFD700;--blu:#0099FF}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;background:#000;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative}

/* ─── ONBOARDING ─── */
.onboard{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 24px env(safe-area-inset-bottom);background:linear-gradient(180deg,#050a07 0%,#000 100%)}
.ob-progress{display:flex;gap:4px;padding:16px 0 24px}
.ob-dot{flex:1;height:3px;border-radius:2px;background:#222;transition:background .3s}
.ob-dot.done{background:var(--pri)}
.ob-dot.cur{background:var(--pri);box-shadow:0 0 8px rgba(0,255,135,.4)}
.ob-step{flex:1;display:flex;flex-direction:column;justify-content:center;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.ob-label{font-size:12px;color:var(--pri);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.ob-title{font-size:28px;font-weight:800;line-height:1.2;margin-bottom:6px}
.ob-sub{font-size:14px;color:#888;line-height:1.5;margin-bottom:24px}
.ob-input{width:100%;padding:14px 16px;background:#111;border:1px solid #222;border-radius:12px;color:#fff;font-size:16px;font-family:inherit;outline:none;margin-bottom:12px;-webkit-appearance:none;transition:border-color .2s}
.ob-input:focus{border-color:var(--pri)}
.ob-input::placeholder{color:#444}
.ob-row{display:flex;gap:10px}
.ob-row .ob-input{flex:1}
.ob-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ob-select-grid.three{grid-template-columns:1fr 1fr 1fr}
.ob-opt{padding:16px 12px;background:#111;border:2px solid #222;border-radius:14px;text-align:center;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none}
.ob-opt.sel{border-color:var(--pri);background:rgba(0,255,135,.08)}
.ob-opt .ico{font-size:24px;margin-bottom:6px;display:block}
.ob-opt .lbl{font-size:14px;font-weight:700;display:block}
.ob-opt .desc{font-size:11px;color:#888;margin-top:4px;display:block}
.ob-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.ob-chip{padding:8px 16px;background:#111;border:1.5px solid #222;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s;-webkit-user-select:none}
.ob-chip.sel{border-color:var(--pri);background:rgba(0,255,135,.08);color:var(--pri)}
.ob-btn{width:100%;padding:16px;background:var(--pri);color:#000;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;margin-top:auto;margin-bottom:16px;transition:transform .1s,opacity .2s}
.ob-btn:active{transform:scale(.97)}
.ob-btn:disabled{opacity:.3;cursor:default}
.ob-btn.secondary{background:#111;color:var(--pri);border:1px solid rgba(0,255,135,.3)}
.ob-back{background:none;border:none;color:#666;font-size:14px;cursor:pointer;padding:8px 0;margin-bottom:8px}

/* ─── MAIN APP ─── */
.main{display:none;padding-bottom:72px}
.main.show{display:block}
.header{padding:max(env(safe-area-inset-top),16px) 16px 12px;background:linear-gradient(135deg,var(--bg),#000);border-bottom:1px solid rgba(0,255,135,.13)}
.phase-tag{display:inline-block;background:rgba(0,255,135,.12);color:var(--pri);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:6px}
.week-title{font-size:26px;font-weight:800;letter-spacing:-.5px}
.week-title span{color:#444;font-weight:400;font-size:16px}
.week-sub{font-size:13px;color:#888;margin-top:4px}
.user-tag{font-size:12px;color:#555;margin-top:2px}
.prog-bar{width:100%;height:4px;background:#222;border-radius:2px;margin-top:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--acc));border-radius:2px;transition:width .5s}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0a0a0a}
.week-btn{background:rgba(0,255,135,.08);border:1px solid rgba(0,255,135,.25);color:var(--pri);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.week-btn:disabled{background:#111;border-color:#222;color:#444;opacity:.5}
.week-btn:active:not(:disabled){transform:scale(.95)}
.day-sel{display:flex;gap:4px;padding:8px 12px;overflow-x:auto;background:#050505;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-sel::-webkit-scrollbar{display:none}
.day-btn{flex:0 0 auto;padding:8px 12px;border-radius:10px;border:none;background:#111;color:#888;font-size:11px;font-weight:500;cursor:pointer;text-align:center;min-width:48px;transition:all .2s}
.day-btn.act{background:var(--pri);color:#000;font-weight:800}
.day-btn .ico{display:block;font-size:14px;margin-bottom:2px}
.content{padding:12px 16px;background:var(--bg);min-height:50vh}
.day-head{margin-bottom:16px}
.day-head h2{font-size:20px;font-weight:800}
.day-head p{font-size:13px;color:#666;margin-top:2px}
.ex-card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.ex-card.open{background:var(--card);border-color:rgba(0,255,135,.25)}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start}
.ex-name{font-size:15px;font-weight:700;line-height:1.3}
.ss-badge{display:inline-block;background:#FFD700;color:#000;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;margin-left:8px;vertical-align:middle}
.ex-muscles{font-size:11px;color:#666;margin-top:2px}
.ex-arrow{color:#444;font-size:18px;transition:transform .2s;flex-shrink:0;margin-left:8px}
.ex-card.open .ex-arrow{transform:rotate(180deg)}
.ex-tags{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.tag{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600}
.tag-pri{background:rgba(0,255,135,.1);color:var(--pri)}
.tag-yel{background:rgba(255,215,0,.1);color:#FFD700}
.tag-blu{background:rgba(0,153,255,.1);color:#09F}
.tag-grn{background:rgba(0,255,135,.15);color:#0F8}
.tag-org{background:rgba(255,215,0,.15);color:#FFD700}
.ex-detail{margin-top:10px;display:none}
.ex-card.open .ex-detail{display:block}
.ex-note{font-size:12px;color:#999;font-style:italic;margin-bottom:8px}
.ex-label{font-size:11px;color:#666;margin-bottom:8px}
.vid-btn{display:inline-flex;align-items:center;gap:6px;background:#FF0000;color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;border:none;cursor:pointer}
.vid-btn:active{transform:scale(.95)}
.section-title{font-size:13px;font-weight:700;color:var(--pri);letter-spacing:1.5px;text-transform:uppercase;margin:20px 0 10px}
.act-card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:8px;font-size:14px}
.finisher{background:linear-gradient(135deg,rgba(0,255,135,.08),rgba(0,255,135,.02));border:1px solid rgba(0,255,135,.2);border-radius:14px;padding:14px;margin-top:16px}
.finisher .label{font-size:12px;font-weight:700;color:var(--pri);letter-spacing:1px}
.finisher p{margin-top:6px;font-size:14px;line-height:1.5}
.cardio-card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-top:12px}
.cardio-card .label{color:#09F;font-size:12px;font-weight:700;letter-spacing:1px}
.note-bubble{background:rgba(0,255,135,.06);border-left:3px solid var(--pri);padding:10px 12px;border-radius:0 10px 10px 0;font-size:12px;color:#ccc;margin-top:12px;line-height:1.5}
.class-banner{background:linear-gradient(135deg,rgba(0,255,135,.08),rgba(0,255,135,.02));border:1px solid rgba(0,255,135,.2);border-radius:14px;padding:14px;margin-bottom:16px}
.class-banner .label{font-size:12px;font-weight:700;color:var(--pri);letter-spacing:1px}
.class-banner h3{font-size:18px;font-weight:800;margin-top:4px}
.class-banner p{font-size:13px;color:#999;margin-top:4px}
.macro-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.macro-box{background:#111;border-radius:14px;padding:12px 6px;text-align:center;border:1px solid #1a1a1a}
.macro-val{font-size:18px;font-weight:800;color:var(--pri)}
.macro-val.red{color:#FF6B6B}.macro-val.yel{color:#FFD700}.macro-val.blu{color:#09F}
.macro-lbl{font-size:10px;color:#666;margin-top:4px}
.meal-card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:10px}
.meal-time{color:var(--pri);font-size:11px;font-weight:700;letter-spacing:1px}
.meal-name{font-size:16px;font-weight:700;margin:2px 0 8px}
.meal-opt{border:1px solid #1a1a1a;border-radius:10px;padding:10px;margin-bottom:6px}
.meal-opt:first-child{background:rgba(0,255,135,.03);border-color:rgba(0,255,135,.12)}
.meal-food{font-size:13px;line-height:1.5}
.meal-macros{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.mp{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px}
.mp-cal{color:#888;background:rgba(136,136,136,.1)}.mp-p{color:#FF6B6B;background:rgba(255,107,107,.1)}
.mp-c{color:#FFD700;background:rgba(255,215,0,.1)}.mp-f{color:#09F;background:rgba(0,153,255,.1)}
.water{background:linear-gradient(135deg,rgba(0,102,255,.08),rgba(0,102,255,.02));border:1px solid rgba(0,102,255,.2);border-radius:14px;padding:14px;margin-top:12px;text-align:center}
.supp-card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:8px}
.supp-top{display:flex;justify-content:space-between;align-items:center}
.supp-name{font-size:15px;font-weight:700}
.supp-dose{font-size:13px;color:var(--pri);font-weight:600;margin-top:6px}
.supp-note{font-size:12px;color:#888;margin-top:4px}
.time-row{display:flex;gap:12px;align-items:center;background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:12px;margin-bottom:8px}
.time-row .t{color:var(--pri);font-size:13px;font-weight:700;min-width:65px}
.time-row .d{font-size:13px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.info-card{background:#111;border-radius:14px;padding:16px;text-align:center;border:1px solid #1a1a1a}
.info-val{font-size:28px;font-weight:800;color:var(--pri)}
.info-val span{font-size:14px}.info-val.yel{color:#FFD700}
.info-lbl{font-size:11px;color:#666;margin-top:4px}
.phase-card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:8px;opacity:.6}
.phase-card.active{opacity:1}
.phase-top{display:flex;justify-content:space-between;align-items:center}
.phase-name{font-size:14px;font-weight:700}
.phase-wks{font-size:11px;color:#666;margin-top:2px}
.phase-desc{font-size:13px;color:#999;line-height:1.5;margin-top:6px}
.split-row{display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid #111}
.split-row .d{color:var(--pri);font-size:13px;font-weight:700;min-width:80px}
.split-row .n{font-size:13px}.split-row .n.off{color:#555}
.rule-row{padding:8px 0;border-bottom:1px solid #111;display:flex;gap:8px}
.rule-row .num{color:var(--pri);font-weight:700}.rule-row .txt{font-size:13px;line-height:1.5}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:#0a0a0aee;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid #1a1a1a;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:10px 0 8px;background:transparent;border:none;border-top:2px solid transparent;color:#555;font-size:10px;font-weight:500;text-align:center;cursor:pointer;transition:all .2s}
.tab.act{color:var(--pri);font-weight:700;border-top-color:var(--pri)}
.tab .ico{display:block;font-size:18px;margin-bottom:2px}
.reset-btn{background:none;border:1px solid #333;color:#666;padding:10px 20px;border-radius:10px;font-size:13px;cursor:pointer;margin-top:20px;width:100%}
.reset-btn:active{background:#111}

/* ─── WELCOME SCREEN ─── */
.welcome{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;background:radial-gradient(ellipse at 50% 40%,#0a1a12 0%,#000 70%)}

.welcome .sub{font-size:14px;color:#666;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
.welcome .tagline{font-size:18px;color:#ccc;line-height:1.6;margin-bottom:40px;max-width:300px}

function finishOnboarding(){
// Calculate everything
const w=parseFloat(OB.weight)||76;
const h=parseFloat(OB.height)||170;
const a=parseInt(OB.age)||28;
const isMale=OB.gender!=='female';

// BMR (Mifflin-St Jeor)
const bmr=isMale?(10*w+6.25*h-5*a+5):(10*w+6.25*h-5*a-161);

// Activity multiplier based on training days
const actMult=OB.days<=3?1.45:OB.days<=4?1.55:OB.days<=5?1.65:1.75;
const tdee=Math.round(bmr*actMult);

// Body fat estimate
const bfMap={'<15%':12,'15-20%':17.5,'20-25%':22.5,'25-30%':27.5,'30%+':32,'No idea':isMale?22:28};
const bf=bfMap[OB.bf]||22;

// Goal-based calorie targets for 3 phases
let ph1Cal,ph2Cal,ph3Cal,totalWeeks,goalLabel;
const goal=OB.goal;
if(goal==='shred'||goal==='lose'){
ph1Cal=Math.round(tdee*0.85);ph2Cal=Math.round(tdee*0.78);ph3Cal=Math.round(tdee*0.72);
totalWeeks=24;goalLabel=goal==='shred'?'Shred Program':'Weight Loss Program';
}else if(goal==='build'){
ph1Cal=Math.round(tdee*1.1);ph2Cal=Math.round(tdee*1.15);ph3Cal=Math.round(tdee*1.1);
totalWeeks=16;goalLabel='Muscle Building Program';
}else if(goal==='recomp'){
ph1Cal=Math.round(tdee*0.95);ph2Cal=Math.round(tdee*0.9);ph3Cal=Math.round(tdee*0.88);
totalWeeks=20;goalLabel='Body Recomposition Program';
}else if(goal==='tone'){
ph1Cal=Math.round(tdee*0.88);ph2Cal=Math.round(tdee*0.82);ph3Cal=Math.round(tdee*0.78);
totalWeeks=20;goalLabel='Tone & Tighten Program';
}else{
ph1Cal=tdee;ph2Cal=tdee;ph3Cal=tdee;totalWeeks=12;goalLabel='Maintenance Program';
}

// Protein: 2.2g/kg for cut, 2g for build, 2g for maintain
const proteinPerKg=goal==='build'?2:2.2;
const protein=Math.round(w*proteinPerKg);
const fatPct=goal==='build'?0.28:0.25;

// Calculate macros per phase
function macros(cal){
const p=protein;const f=Math.round((cal*fatPct)/9);const c=Math.round((cal-p*4-f*9)/4);
return{cal,p,c,f};
}

// Phase labels
const phNames=goal==='build'?
['Foundation','Growth','Peak']:
['Foundation','Accelerate','Peak'];
const phWeeks=goal==='build'?[6,6,4]:
totalWeeks===24?[8,8,8]:totalWeeks===20?[7,7,6]:[4,4,4];

// Target outcome
const lbm=w*(1-bf/100);
let targetW,targetBf;
if(goal==='shred'){targetBf=bf>20?12:10;targetW=Math.round(lbm/(1-targetBf/100));}
else if(goal==='lose'){targetBf=Math.max(bf-8,14);targetW=Math.round(lbm/(1-targetBf/100));}
else if(goal==='build'){targetBf=bf+2;targetW=Math.round(w+w*0.05);}
else if(goal==='recomp'){targetBf=Math.max(bf-5,13);targetW=Math.round(w-2);}
else if(goal==='tone'){targetBf=Math.max(bf-6,14);targetW=Math.round(lbm/(1-targetBf/100));}
else{targetBf=bf;targetW=w;}

U={
name:OB.name||'Athlete',gender:OB.gender||'male',age:a,height:h,weight:w,bf,
goal,goalLabel,exp:OB.exp||'intermediate',days:OB.days,duration:OB.duration,
proteins:OB.proteins,carbs:OB.carbs,injuries:OB.injuries,
bmr,tdee,totalWeeks,
phases:[
{name:phNames[0],weeks:phWeeks[0],...macros(ph1Cal),label:goal==='build'?'Lean Surplus':'Moderate Cut'},
{name:phNames[1],weeks:phWeeks[1],...macros(ph2Cal),label:goal==='build'?'Growth Push':'Aggressive Cut'},
{name:phNames[2],weeks:phWeeks[2],...macros(ph3Cal),label:goal==='build'?'Refine':'Peak Shred'},
],
targetW,targetBf
};

try{localStorage.setItem('fitpro_user',JSON.stringify(U))}catch(e){}
S.week=1;S.tab='workout';S.day=0;
render();
}

function getPhase(wk){
if(!U)return 1;
let cum=0;
for(let i=0;i<U.phases.length;i++){cum+=U.phases[i].weeks;if(wk<=cum)return i+1;}
return U.phases.length;
}
function getPhaseWeek(wk){
let cum=0;
for(let i=0;i<U.phases.length;i++){if(wk<=cum+U.phases[i].weeks)return wk-cum;cum+=U.phases[i].weeks;}
return wk;
}

// PHASE COLORS
// ═══════════════════════════════════════════════════════════════════
const COLORS={1:{pri:"#00FF87",bg:"#0a1a12",card:"#0d2318"},2:{pri:"#FF6B35",bg:"#1a0f0a",card:"#231510"},3:{pri:"#FF2D55",bg:"#1a0a10",card:"#230d15"}};
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// ═══════════════════════════════════════════════════════════════════

const SUPPS=[
{name:"Creatine Monohydrate",dose:"5g daily",when:"Post-workout or morning",note:"No cycling needed. Every day with water."},
{name:"Whey Protein",dose:"1-2 scoops",when:"Post-workout + as needed",note:"Use to hit daily protein target."},
{name:"Multivitamin",dose:"1 tablet",when:"With breakfast",note:"Take with food for absorption."},
{name:"Fish Oil / Omega-3",dose:"2-3g",when:"With lunch or dinner",note:"Supports joints & recovery."},

// ═══════════════════════════════════════════════════════════════════
// RENDER MAIN APP
// ═══════════════════════════════════════════════════════════════════
function render(){
if(!U){renderOnboarding();return}
const W=genWeek(S.week);
const phase=W.phase;
const c=COLORS[phase]||COLORS[1];
const mp=genMeals(phase,S.week);
const day=W.days[S.day]||W.days[0];
const phLabel=U.phases[phase-1]?.name||'Phase '+phase;
const phWeek=getPhaseWeek(S.week);
const phTotal=U.phases[phase-1]?.weeks||8;

document.documentElement.style.setProperty('--pri',c.pri);
document.documentElement.style.setProperty('--bg',c.bg);
document.documentElement.style.setProperty('--card',c.card);

try{localStorage.setItem('fitpro_state',JSON.stringify({week:S.week}))}catch(e){}

let html=`<div class="main show">
<div class="header">
<div class="phase-tag">PHASE ${phase} — ${phLabel.toUpperCase()}</div>
<h1 class="week-title">Week ${S.week} <span>of ${U.totalWeeks}</span></h1>
<p class="week-sub">Phase week ${phWeek}/${phTotal} · ${mp.cal} cal/day · ${mp.label}</p>
<p class="user-tag">${U.name} · ${U.goalLabel}</p>
<div class="prog-bar"><div class="prog-fill" style="width:${(S.week/U.totalWeeks)*100}%"></div></div>
</div>
<div class="week-nav">
<button class="week-btn" ${S.week<=1?'disabled':''} onclick="S.week=Math.max(1,S.week-1);S.expanded=null;render()">◀ Prev</button>
<span style="color:#666;font-size:13px">Week ${S.week}</span>
<button class="week-btn" ${S.week>=U.totalWeeks?'disabled':''} onclick="S.week=Math.min(U.totalWeeks,S.week+1);S.expanded=null;render()">Next ▶</button>
</div>
<div class="day-sel">
${DAYS.map((d,i)=>`<button class="day-btn${S.day===i?' act':''}" onclick="S.day=${i};S.expanded=null;render()"><span class="ico">${W.days[i]?.ico||'📅'}</span>${d.slice(0,3)}</button>`).join('')}
</div>
<div class="content">
<div class="day-head"><h2>${day.ico} ${day.name}</h2><p>${day.sub}</p></div>
${S.tab==='workout'?renderWorkout(day,phase):S.tab==='meals'?renderMeals(mp):S.tab==='supps'?renderSupps():renderInfo(W,S.week,phase,mp)}
</div>
<div class="tab-bar">
${[{id:'workout',ico:'🏋️',l:'Workout'},{id:'meals',ico:'🥩',l:'Meals'},{id:'supps',ico:'💊',l:'Supps'},{id:'info',ico:'📊',l:'Info'}]
.map(t=>`<button class="tab${S.tab===t.id?' act':''}" onclick="S.tab='${t.id}';render()"><span class="ico">${t.ico}</span>${t.l}</button>`).join('')}
</div></div>`;
$('app').innerHTML=html;
}

function renderWorkout(day,phase){
if(day.act)return`
<p class="section-title">${day.name.includes('FULL REST')?'📋 REST CHECKLIST':'📋 RECOVERY'}</p>
${day.act.map(a=>`<div class="act-card">${a}</div>`).join('')}
<div class="note-bubble">${day.name.includes('REST')?'💤 Growth happens during rest. Aim for 7-9 hours of sleep.':'💡 Active recovery boosts blood flow and speeds recovery.'}</div>`;

let exercises=day.ex||[];
let html='';
if(day.cond){
html+=`<div class="class-banner"><p class="label">🔥 CONDITIONING SESSION</p><h3>${day.condDesc||'Cardio + Core'}</h3>
<p style="margin-top:8px;color:#888;font-size:12px">Choose: cycling class, running, BODYCOMBAT, swimming, or HIIT</p></div>`;
exercises=day.post||[];
if(exercises.length)html+=`<p class="section-title">POST-CARDIO CORE WORK</p>`;
}
html+=exercises.map((ex,i)=>{
const key=S.day+'-'+i;const open=S.expanded===key;
return`<div class="ex-card${open?' open':''}" onclick="S.expanded=S.expanded==='${key}'?null:'${key}';render()">
<div class="ex-top"><div><p class="ex-name">${ex.name}${ex.ss?'<span class="ss-badge">SUPERSET</span>':''}</p>
<p class="ex-muscles">${ex.m}</p></div><span class="ex-arrow">▾</span></div>
<div class="ex-tags"><span class="tag tag-pri">${ex.s} sets</span><span class="tag tag-yel">${ex.r} reps</span><span class="tag tag-blu">Rest ${ex.rest}</span></div>
<div class="ex-detail">${ex.note?`<p class="ex-note">💡 ${ex.note}</p>`:''}${ex.l?`<p class="ex-label">Style: ${ex.l}</p>`:''}
<a href="https://www.youtube.com/watch?v=${ex.yt}" target="_blank" rel="noopener" class="vid-btn" onclick="event.stopPropagation()">▶ Watch Demo</a></div></div>`;}).join('');
if(day.fin)html+=`<div class="finisher"><p class="label">🔥 FINISHER</p><p>${day.fin}</p></div>`;
if(day.cardio)html+=`<div class="cardio-card"><p class="label">🏃 CARDIO</p><p style="margin-top:6px;font-size:14px">${day.cardio}</p></div>`;
return html;
}

function renderMeals(mp){

<div class="macro-box"><p class="macro-val red">${mp.p}g</p><p class="macro-lbl">Protein</p></div>
<div class="macro-box"><p class="macro-val yel">${mp.c}g</p><p class="macro-lbl">Carbs</p></div>
<div class="macro-box"><p class="macro-val blu">${mp.f}g</p><p class="macro-lbl">Fat</p></div></div>
<p class="section-title" style="margin-top:16px">📋 DAILY MEALS — ${mp.label.toUpperCase()}</p>
<p style="font-size:12px;color:#666;margin:-6px 0 12px">3 options per meal — pick one each day</p>
${mp.meals.map(meal=>`<div class="meal-card"><p class="meal-time">${meal.time}</p><p class="meal-name">${meal.name}</p>
${meal.opts.map(o=>`<div class="meal-opt"><p class="meal-food">${o.food}</p>
<div class="meal-macros"><span class="mp mp-cal">${o.cal} cal</span><span class="mp mp-p">P:${o.p}g</span><span class="mp mp-c">C:${o.c}g</span><span class="mp mp-f">F:${o.f}g</span></div></div>`).join('')}</div>`).join('')}
<div class="water"><div style="font-size:24px">💧</div><h4 style="color:#09F;font-size:16px;font-weight:700;margin-top:4px">WATER: 3.5L+ DAILY</h4>
<p style="font-size:13px;color:#888;margin-top:4px">More on training days</p></div>`;
}

function renderSupps(){

${SUPPS.map((s,i)=>`<div class="supp-card"><div class="supp-top"><p class="supp-name">${s.name}</p>
<span class="tag ${i<3?'tag-grn':'tag-org'}">${i<3?'ESSENTIAL':'RECOMMENDED'}</span></div>
<p class="supp-dose">${s.dose} — ${s.when}</p><p class="supp-note">${s.note}</p></div>`).join('')}
<p class="section-title" style="margin-top:24px">⏰ DAILY TIMING</p>
${[{t:"7:00 AM",d:"Multivitamin + Vitamin D3"},{t:"1:00 PM",d:"Fish Oil / Omega-3"},{t:"Pre-gym",d:"Caffeine (coffee or pre-workout)"},

function renderInfo(W,week,phase,mp){

<div class="info-grid">
<div class="info-card"><p class="info-val">${U.weight}<span>kg</span></p><p class="info-lbl">Start Weight</p></div>
<div class="info-card"><p class="info-val">~${U.bf}<span>%</span></p><p class="info-lbl">Body Fat</p></div>
<div class="info-card"><p class="info-val">${U.totalWeeks}</p><p class="info-lbl">Total Weeks</p></div>
<div class="info-card"><p class="info-val yel">${week}</p><p class="info-lbl">Current Week</p></div></div>
<p class="section-title" style="margin-top:24px">📅 PHASES</p>
${U.phases.map((p,i)=>{const a=i+1===phase;const cum=U.phases.slice(0,i).reduce((s,x)=>s+x.weeks,0);

<p class="phase-wks">Weeks ${cum+1}–${cum+p.weeks} · ${p.cal} cal/day</p>
<p class="phase-desc">${p.label} · P:${p.p}g C:${p.c}g F:${p.f}g</p></div>`;}).join('')}

${DAYS.map((d,i)=>`<div class="split-row"><span class="d">${d}</span>
<span class="n${W.days[i]?.ex?.length||W.days[i]?.cond?'':' off'}">${W.days[i]?.ico||''} ${W.days[i]?.name||'Rest'}</span></div>`).join('')}

<strong>Start:</strong> ${U.weight}kg @ ~${U.bf}% body fat<br>
<strong>Target:</strong> ~${U.targetW}kg @ ~${U.targetBf}% body fat<br>
<strong>Timeline:</strong> ${U.totalWeeks} weeks of consistent effort<br><br>
${isCut?'Visible definition, lean muscle, and a physique you can be proud of.':'More muscle mass, strength gains, and a more powerful physique.'} Consistency is everything.
</div>
<button class="reset-btn" onclick="resetApp()">🔄 Reset & Create New Profile</button>`;
}

function resetApp(){
if(confirm('Start over with a new profile?')){
try{localStorage.clear()}catch(e){}
U=null;S={week:1,tab:'workout',day:0,expanded:null,step:0};
OB={name:'',gender:'',age:'',height:'',weight:'',bf:'',goal:'',exp:'',days:5,duration:'75',proteins:['chicken','eggs'],carbs:['rice','oats'],injuries:[]};
renderOnboarding();
}
}
