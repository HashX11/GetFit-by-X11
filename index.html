function exC(e,k,op,c){return`<div class="ec${op?' op':''}" style="${op?`background:${c.c}`:''}" onclick="S.exp=S.exp==='${k}'?null:'${k}';render()"><div class="etp"><div><p class="en">${e.n}${e.ss?'<span class="ssb">SS</span>':''}</p><p class="em">${e.m}</p></div><span class="ea">▾</span></div><div class="et"><span class="tg tp">${e.s} sets</span><span class="tg ty">${e.r} reps</span><span class="tg tb2">${e.x}</span></div><div class="ed">${e.nt?`<p class="eno">💡 ${e.nt}</p>`:''}<a href="https://www.youtube.com/watch?v=${e.y}" target="_blank" class="vd" onclick="event.stopPropagation()">▶ Demo</a></div></div>`;}

function rW(d,p,c){

<p class="st" style="color:${c.p};margin-top:14px">${mp.fast?'☪ FASTING':'📋 DAILY'} MEALS</p><p style="font-size:11px;color:#444;margin:-4px 0 10px">Pick one per meal</p>
${mp.meals.map(m=>`<div class="mc"><p style="color:${c.p};font-size:10px;font-weight:700;letter-spacing:1px">${m.t}</p><p style="font-size:15px;font-weight:700;margin:2px 0 7px">${m.nm}</p>${m.o.map(o=>`<div class="mo"><p style="font-size:12px;line-height:1.5">${o.f}</p><div class="mm"><span class="mp" style="color:#666;background:#0f0f0f">${o.k} cal</span><span class="mp" style="color:#FF4757;background:rgba(255,71,87,.08)">P:${o.p}g</span><span class="mp" style="color:#FFD700;background:rgba(255,215,0,.08)">C:${o.c}g</span><span class="mp" style="color:#09F;background:rgba(0,153,255,.08)">F:${o.a}g</span></div></div>`).join('')}</div>`).join('')}
<div style="background:rgba(0,102,255,.05);border:1px solid rgba(0,102,255,.12);border-radius:13px;padding:13px;margin-top:10px;text-align:center"><div style="font-size:22px">💧</div><div style="color:#09F;font-size:15px;font-weight:700;margin-top:3px">${mp.fast?'SUHOOR: 1.5L+ WATER':'3.5L+ DAILY'}</div></div>`;}

function rR(wk,c){const rp=getRn(wk);return`<p class="st" style="color:${c.p};margin-top:0">🏃 5K → 10K PROGRAM</p>
<div class="rc"><p style="color:#09F;font-size:11px;font-weight:700;letter-spacing:1px">THIS WEEK</p><h4 style="font-size:16px;font-weight:800;margin-top:3px">${rp.t}</h4><p style="font-size:13px;color:#999;margin-top:4px">${rp.p}</p><div class="rs"><div><p style="font-size:16px;font-weight:800;color:#09F">${rp.tg}</p><p style="font-size:9px;color:#666;margin-top:2px">Target</p></div><div><p style="font-size:16px;font-weight:800;color:#09F">${wk<=8?'6:00+':wk<=16?'5:30':'5:00'}</p><p style="font-size:9px;color:#666;margin-top:2px">min/km</p></div></div><p style="font-size:12px;color:#666;margin-top:10px;font-style:italic">💡 ${rp.nt}</p></div>
<p class="st" style="color:${c.p}">FULL PLAN</p>${RN.map(r=>{const cur=wk>=r.wk[0]&&wk<=r.wk[1],dn=wk>r.wk[1];return`<div class="ac" style="${cur?`border-color:${c.p}30;background:${c.p}05`:dn?'opacity:.4':''}"><div style="display:flex;justify-content:space-between"><div><span style="font-size:12px;font-weight:700;${cur?`color:${c.p}`:'color:#555'}">Wk ${r.wk[0]}-${r.wk[1]}</span><span style="font-size:13px;font-weight:700;margin-left:8px">${r.t}</span></div>${cur?`<span class="tg tp">NOW</span>`:dn?'<span style="color:#333">✓</span>':''}</div><p style="font-size:12px;color:#666;margin-top:3px">${r.tg}</p></div>`}).join('')}`;}

function rP(c){return`<p class="st" style="color:${c.p};margin-top:0">📈 LOG</p><p style="font-size:11px;color:#444;margin-bottom:10px">Weekly: same day, morning, fasted</p>
<div class="lr"><input class="li" id="lw" type="number" inputmode="decimal" placeholder="Weight (kg)"><input class="li" id="lb" type="number" inputmode="decimal" placeholder="BF %">
<button style="padding:10px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;background:${c.p};color:#000;cursor:pointer" onclick="addLog()">Log</button></div>
${LOG.length?`<p class="st" style="color:${c.p}">HISTORY</p>${LOG.slice().reverse().map(l=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #0a0a0a;font-size:13px"><span style="color:#555">Wk ${l.wk}</span><span><b>${l.w}kg</b></span><span style="color:#888">${l.bf?l.bf+'%':''}</span></div>`).join('')}`:''}
<p class="st" style="color:${c.p};margin-top:20px">🎯 MILESTONES & CHEAT MEALS</p><p style="font-size:11px;color:#444;margin-bottom:10px">Hit the target → earn the reward</p>
${MST.map(m=>{const dn=S.week>m.wk,cur=S.week>=m.wk-1&&S.week<=m.wk;
return`<div class="ms${dn?' d':''}${cur?' c':''}"><div class="msl"></div><div class="msc">
<p style="font-size:11px;color:${cur?c.p:'#555'};font-weight:600">${cur?'→ ':dn?'✓ ':''}WEEK ${m.wk}</p>
<p style="font-size:13px;font-weight:700;margin-top:2px">${m.w}kg · ${m.bf}%</p>
<p style="font-size:11px;color:#666;margin-top:2px">${m.nt}</p>
${m.ch?`<div class="cheat" style="margin-top:6px"><p class="wk">🎉 CHEAT MEAL EARNED</p><p class="rw">${m.cr}</p><p class="rl">Rules: eat normal all day, cheat = dinner only. Train that day. No sugary drinks. Don't weigh yourself next morning.</p></div>`:''}</div></div>`}).join('')}`;}

function rSh(c){return`<p class="st" style="color:${c.p};margin-top:0">🛒 WEEKLY SHOPPING LIST</p><p style="font-size:11px;color:#444;margin-bottom:6px">Keep these stocked — never miss a meal</p>
${Object.entries(SHOP).map(([cat,items])=>`<div class="shop-cat" style="color:${c.p}">${cat}</div>${items.map(([n,q])=>`<div class="shop-item"><span>${n}</span><span class="shop-qty">${q}</span></div>`).join('')}`).join('')}
<p class="st" style="color:#FF4757;margin-top:24px">🚫 NEVER BUY / AVOID</p><p style="font-size:11px;color:#444;margin-bottom:8px">These will directly sabotage your cut</p>
${AVOID.map(a=>`<div class="avoid-item"><p class="nm">${a.n}</p><p class="why">${a.w}</p></div>`).join('')}
<div class="nb" style="border-color:${c.p};background:${c.p}06;margin-top:16px">💡 <b>Pro tip:</b> Shop with a list, never hungry. Stick to the perimeter of the store (fresh food). If it has more than 5 ingredients on the label, skip it.</div>`;}

function rSp(c){return`<p class="st" style="color:${c.p};margin-top:0">💊 STACK & CYCLING</p>
${SP.map(s=>`<div class="sc"><div class="sct"><p style="font-size:14px;font-weight:700">${s.n}</p><span class="tg ${s.c?'tg2':s.r?'to':'tb2'}">${s.c?'TAKING':s.r?'ADD':'OPTIONAL'}</span></div><p style="font-size:12px;font-weight:600;color:${c.p};margin-top:5px">${s.d} — ${s.w}</p><p style="font-size:11px;color:#666;margin-top:3px">${s.nt}</p>
<div style="margin-top:6px;padding:6px 10px;background:${s.cy.includes('NO')?'rgba(0,255,135,.04)':'rgba(255,215,0,.06)'};border:1px solid ${s.cy.includes('NO')?'rgba(0,255,135,.1)':'rgba(255,215,0,.15)'};border-radius:8px;font-size:11px;color:${s.cy.includes('NO')?'#0F8':'#FFD700'};font-weight:600">🔄 ${s.cy}</div></div>`).join('')}
<p class="st" style="color:${c.p};margin-top:20px">⏰ TIMING</p>
${(S.fasting?[{t:"SUHOOR",d:"Multi+D3+Omega3+Creatine+Electrolytes"},{t:"IFTAR",d:"Whey shake (within 30min)"},{t:"NIGHT",d:"Magnesium+Casein"}]:[{t:"7AM",d:"Multivitamin + D3"},{t:"1PM",d:"Fish Oil"},{t:"Pre-gym",d:"Pre-workout (caffeine)"},{t:"Post-gym",d:"Creatine 5g + Whey"},{t:"9PM",d:"Magnesium 400mg"}]).map(t=>`<div class="tr"><span style="color:${c.p};font-size:12px;font-weight:700;min-width:60px">${t.t}</span><span style="font-size:12px">${t.d}</span></div>`).join('')}`;}

function rI(W,c,mp){return`<p class="st" style="color:${c.p};margin-top:0">📊 HASHEM</p>
<div class="ig"><div class="ic"><p class="iv" style="color:${c.p}">76<span>kg</span></p><p class="il">Start</p></div><div class="ic"><p class="iv" style="color:${c.p}">~22<span>%</span></p><p class="il">Start BF</p></div><div class="ic"><p class="iv" style="color:${c.p}">67<span>kg</span></p><p class="il">Target</p></div><div class="ic"><p class="iv" style="color:${c.p}">10<span>%</span></p><p class="il">Target BF</p></div></div>
<p class="st" style="color:${c.p};margin-top:20px">📅 PHASES</p>
${ME.phases.map((p2,i)=>{const a=i+1===W.phase,cm=ME.phases.slice(0,i).reduce((s,x)=>s+x.wk,0);return`<div style="background:#0a0a0a;border:1px solid #151515;border-radius:13px;padding:13px;margin-bottom:7px;opacity:${a?1:.5};border-left:3px solid ${PC[i+1].p}"><div style="display:flex;justify-content:space-between"><p style="font-size:14px;font-weight:700;color:${PC[i+1].p}">PHASE ${i+1}: ${p2.n}</p>${a?`<span class="tg" style="background:${PC[i+1].p}20;color:${PC[i+1].p}">NOW</span>`:''}</div><p style="font-size:11px;color:#555;margin-top:2px">Wk ${cm+1}–${cm+p2.wk} · ${p2.cal} cal</p><p style="font-size:12px;color:#888;margin-top:4px">${p2.l} · P:${p2.p}g C:${p2.c}g F:${p2.f}g</p></div>`}).join('')}
<p class="st" style="color:${c.p};margin-top:20px">🏋️ SPLIT</p>
${DAYS.map((d,i)=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #0a0a0a"><span style="color:${c.p};font-size:12px;font-weight:700;min-width:72px">${d}</span><span style="font-size:12px;${W.days[i]?.ex?.length||W.days[i]?.rn?'color:#fff':'color:#333'}">${W.days[i]?.ic||''} ${W.days[i]?.nm||''}</span></div>`).join('')}
<p class="st" style="color:${c.p};margin-top:20px">⚡ RULES</p>
${["Progressive overload when you hit all reps","Workouts randomize weekly — no adaptation","Track weights, reps & how you felt","Sleep 7-9h — this is when you grow","Weigh in weekly: same day, fasted","Progress photos every 2 weeks","Phase 3: refeed +400 carbs every 10-14 days","Miss a day? Continue — never double up","Run program is separate — don't skip it","Abu Dhabi: extra water + electrolytes always"].map((r,i)=>`<div style="padding:7px 0;border-bottom:1px solid #0a0a0a;display:flex;gap:7px"><span style="color:${c.p};font-weight:700;min-width:18px">${i+1}.</span><span style="font-size:12px;line-height:1.5">${r}</span></div>`).join('')}

<p class="st" style="color:${c.p};margin-top:28px">🏆 AFTER WEEK 24 — MAINTENANCE LIFE</p>
<div class="maint-card"><h4>Calories: ${MAINT.cal}/day</h4><p>Back to maintenance. No deficit. P:${MAINT.p}g C:${MAINT.c}g F:${MAINT.f}g</p></div>
<div class="maint-card"><h4>Training: ${MAINT.training}</h4><p>Drop to 4 gym days. You've earned the extra rest. Keep intensity high but volume drops 20%.</p></div>
<div class="maint-card"><h4>Cardio: ${MAINT.cardio}</h4><p>Run for fun now. Maintain your 10K ability. Add a daily walk for general health.</p></div>
<div class="maint-card"><h4>Lifestyle Rules</h4><p>${MAINT.rules.map((r,i)=>`${i+1}. ${r}`).join('<br>')}</p></div>
<div class="nb" style="border-color:${c.p};background:${c.p}06;margin-top:16px">🎯 <b>GOAL:</b> 76kg@22% → 67kg@10% in 24 weeks. Then maintain for life. Every rep counts, Hashem.</div>
<button class="rb" onclick="if(confirm('Reset all progress?')){LOG=[];S.week=1;save();render()}">🔄 Reset</button>`;}

function addLog(){const w=parseFloat(document.getElementById('lw')?.value),b=parseFloat(document.getElementById('lb')?.value);if(!w)return;LOG.push({wk:S.week,w,bf:b||null});save();render();}
render();
</script>
</body>
</html>
