function pk(a,n,r){return shuf(a,r).slice(0,n)}

<h4 style="font-size:16px;font-weight:800;margin-top:3px">Your longest/hardest run this week</h4>
<p style="font-size:13px;color:#999;margin-top:4px">${rp.p}</p>
<div class="rs"><div><p style="font-size:16px;font-weight:800;color:#09F">${rp.tg}</p><p style="font-size:9px;color:#666;margin-top:2px">Target</p></div><div><p style="font-size:16px;font-weight:800;color:#09F">${S.week<=8?'6:00+':S.week<=16?'5:30':'5:00'}</p><p style="font-size:9px;color:#666;margin-top:2px">min/km</p></div></div>
<p style="font-size:12px;color:#666;margin-top:8px">Pick: 🌳 Outdoor (best) · 🏃 Treadmill (1-2%) · 🏟️ Track</p>
<p style="font-size:12px;color:#666;margin-top:6px;font-style:italic">💡 ${rp.nt}</p></div>`;
if(S.fasting)html+=`<div class="nb" style="border-color:#FFD700;background:rgba(255,215,0,.04)">☪ Run AFTER iftar (1-2hr gap). Easy pace, shorter distance.</div>`;
if(cls&&cls.active){html+=`<div class="cls-card"><p style="color:#FF6B35;font-size:11px;font-weight:700;letter-spacing:1px">🏟️ OR: CLASS (pick ${cls.perWeek}/week)</p><h4 style="font-size:16px;font-weight:800;margin-top:3px">${cls.opts.join(' or ')}</h4><p style="font-size:12px;color:#999;margin-top:6px;line-height:1.5">${cls.note}</p>
<p style="font-size:11px;color:#FF6B35;margin-top:6px;font-weight:600">Class replaces the run for that day. Do core work after.</p></div>`;}
html+=`<p class="st" style="color:${c.p}">💪 CORE WORK (after run or class)</p>`;
html+=d.po.map((e,i)=>exC(e,'r-'+i,S.exp==='r-'+i,c)).join('');
return html;}

// REGULAR GYM DAY (Mon, Tue, Thu, Fri)
let html='';
if(d.am)html+=`<div class="ac" style="border-left:3px solid #09F;margin-bottom:12px"><p style="color:#09F;font-size:12px;font-weight:600">${d.am}</p></div>`;
html+=d.ex.map((e,i)=>exC(e,S.day+'-'+i,S.exp===S.day+'-'+i,c)).join('');
if(d.fn)html+=`<div style="background:${c.p}08;border:1px solid ${c.p}20;border-radius:13px;padding:13px;margin-top:14px"><p style="font-size:11px;font-weight:700;color:${c.p};letter-spacing:1px">🔥 FINISHER</p><p style="margin-top:5px;font-size:13px">${d.fn}</p></div>`;
if(d.noCardio)html+=`<div class="ac" style="border-left:3px solid #FF4757;margin-top:12px"><p style="color:#FF4757;font-size:12px;font-weight:700">${d.noCardio}</p></div>`;
if(d.cd)html+=`<div class="ac" style="margin-top:12px;border-left:3px solid #09F"><p style="color:#09F;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:6px">🏃 POST-WORKOUT CARDIO</p><p style="font-size:12px;line-height:1.8">${d.cd}</p></div>`;
return html;}

function rM(mp,c){
// Unified daily timeline: food + supplements at each time
const p=gph(S.week);
const isFast=mp.fast;
const isGym=S.day<2||S.day===3||S.day===4; // push,pull,legs,upper = gym days

let timeline;
// D3 every other day = Mon(0), Wed(2), Fri(4) = even day indices
// D3 every 3rd day (Phase 2+) = Mon(0), Thu(3), Sun(6)
const isD3Day=p===1?[0,2,4].includes(S.day):[0,3,6].includes(S.day);
const d3Label=isD3Day?"💊 Vitamin D3 10,000 IU ✓ (today)":"";
const d3Skip=isD3Day?"":"(D3: not today — "+(p===1?"Mon/Wed/Fri":"Mon/Thu/Sun")+" only)";
if(isFast){
timeline=[
{t:"SUHOOR (Pre-Dawn)",type:"meal+supp",meal:mp.meals[0],
supps:["💊 Multivitamin (right after eating)",d3Label,"💊 Fish Oil 2-3g","💊 Creatine 5g"].concat(p===1?["🔥 CLA Keto Cut 3 caps"]:[]).filter(Boolean),
note:"All supps with food. Eat fat (eggs/PB) for absorption. Drink 1-1.5L water slowly."},
{t:"IFTAR (Sunset)",type:"meal+supp",meal:mp.meals[1],
supps:[],
note:"Break fast: 3 dates + water. Wait 15 min. Then eat main meal ONLY. No whey now — your iftar meal already has 38-44g protein. Let it digest."},
{t:"EVENING (2-3hrs after iftar)",type:"meal+supp",meal:mp.meals[2],
supps:["💊 Whey Protein (if you trained today — to hit protein target)","💊 Magnesium Glycinate 400mg (30 min before sleep)"],
note:"Whey moved here — 2-3hrs after iftar so protein is spaced out. Yogurt/cottage cheese option works too. Magnesium right before bed."}
];
} else {
timeline=[
{t:"7:00 AM — After Breakfast",type:"meal+supp",meal:mp.meals[0],
supps:["💊 Multivitamin (immediately after eating)"],
note:"Eat eggs, oats+PB, or any fat-containing breakfast. Multi has zinc 15mg + Vit C 500mg + B vitamins — no separate zinc or C needed."},
{t:"10:00 AM — Snack",type:"meal",meal:mp.meals[1]},
{t:"1:00 PM — After Lunch",type:"meal+supp",meal:mp.meals[2],
supps:["💊 Fish Oil 2-3g",d3Label].concat(p===1?["🔥 CLA Keto Cut 3 caps (Phase 1 only)"]:[]).filter(Boolean),
note:"Fish Oil + D3 together after your fattiest meal = maximum absorption."+(p===1?" CLA stops after week 8.":"")+(isD3Day?"":" "+d3Skip)},
{t:"3:30 PM — Pre-Workout",type:"meal+supp",meal:mp.meals[3],
supps:isGym?["🔥 Super Burner Extra 2 caps (~115mg caffeine)"]:["No supps"],
note:isGym?"30 min before gym. Light carbs (banana/dates) speed caffeine.":"Rest day — no pre-workout."},
{t:"6:30 PM — Post-Workout / Dinner",type:"meal+supp",meal:mp.meals[4],
supps:["💊 Creatine 5g"].concat(isGym?["💊 Whey Protein (if short on protein)"]:[]),
note:"Creatine with carbs (rice/potato) for best absorption."},
{t:"9:30 PM — Before Sleep",type:"meal+supp",meal:mp.meals[5],
supps:["💊 Magnesium Glycinate 400mg"],
note:"Magnesium ONLY at bedtime — no other minerals competing. Yogurt/cottage cheese = slow overnight protein."}
];
}

return`${isFast?'<div class="fb">☪ Fasting Day — Modified Timing</div>':''}
<div class="mg"><div class="mbox"><p class="mv2" style="color:${c.p}">${mp.cal}</p><p class="ml3">Cal</p></div><div class="mbox"><p class="mv2" style="color:#FF4757">${mp.p}g</p><p class="ml3">Protein</p></div><div class="mbox"><p class="mv2" style="color:#FFD700">${mp.c}g</p><p class="ml3">Carbs</p></div><div class="mbox"><p class="mv2" style="color:#09F">${mp.f}g</p><p class="ml3">Fat</p></div></div>
${isFast?'<div class="nb" style="border-color:#FFD700;background:rgba(255,215,0,.04);margin-top:10px">⚡ ~1600-1800 cal. Lower training intensity. Front-load hydration at suhoor.</div>':''}
${!isFast?`<div style="display:flex;gap:6px;margin-top:10px;margin-bottom:4px"><span class="tg ${isGym?'tp':'to'}" style="font-size:10px">${isGym?'🏋️ GYM DAY':'🛋️ REST DAY'} — supps adjusted</span></div>`:''}
<p class="st" style="color:${c.p};margin-top:10px">📋 DAILY TIMELINE</p>
<p style="font-size:11px;color:#444;margin:-4px 0 10px">Food + supplements at each time · Tap meals for recipes</p>
${timeline.map((slot,si)=>{
const m=slot.meal;
const supps=slot.supps||[];
const mid=m?m.id:'x';
const idx=(S.mi[mid]||0)%((m&&m.o?m.o.length:1)||1);
const o=m&&m.o?m.o[idx]:null;
const total=m&&m.o?m.o.length:0;
const mk2='m-'+mid;
const isOpen=S.exp===mk2;
return`<div class="mc" style="border-left:3px solid ${c.p}30">
<p style="color:${c.p};font-size:11px;font-weight:700;letter-spacing:1px">${slot.t}</p>

${o?`<div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0 4px">
<p style="font-size:14px;font-weight:700;flex:1">${m.nm}</p>
${total>1?`<button onclick="event.stopPropagation();S.mi['${mid}']=(S.mi['${mid}']||0)+1;render()" style="background:${c.p}15;border:1px solid ${c.p}30;color:${c.p};padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">🔀 ${idx+1}/${total}</button>`:''}
</div>
<div style="border:1px solid #1a1a1a;border-radius:10px;padding:10px;cursor:pointer;${isOpen?`border-color:${c.p}30;background:${c.p}04`:''}" onclick="S.exp=S.exp==='${mk2}'?null:'${mk2}';render()">
<p style="font-size:13px;line-height:1.5">${o.f}</p>
<div class="mm" style="margin-top:6px"><span class="mp" style="color:#666;background:#0f0f0f">${o.k} cal</span><span class="mp" style="color:#FF4757;background:rgba(255,71,87,.08)">P:${o.p}g</span><span class="mp" style="color:#FFD700;background:rgba(255,215,0,.08)">C:${o.c}g</span><span class="mp" style="color:#09F;background:rgba(0,153,255,.08)">F:${o.a}g</span></div>
${isOpen&&o.r?`<div class="recipe"><b>📝 How to make:</b><br>${o.r}</div>`:''}
${isOpen&&!o.r?`<div class="recipe" style="color:#555">Tap 🔀 to see other options</div>`:''}
</div>`:m?`<p style="font-size:14px;font-weight:700;margin:6px 0">${m.nm}</p>`:''}

${supps.length?`<div style="margin-top:8px;padding:8px 10px;background:rgba(138,43,226,.04);border:1px solid rgba(138,43,226,.12);border-radius:10px">
${supps.map(s=>`<p style="font-size:12px;color:#b388ff;line-height:1.8">${s}</p>`).join('')}
</div>`:''}
${slot.note?`<p style="font-size:11px;color:#555;margin-top:6px;font-style:italic">💡 ${slot.note}</p>`:''}
</div>`;}).join('')}

<div style="background:rgba(0,102,255,.05);border:1px solid rgba(0,102,255,.12);border-radius:13px;padding:13px;margin-top:10px;text-align:center">
<div style="font-size:22px">💧</div>
<div style="color:#09F;font-size:15px;font-weight:700;margin-top:3px">${isFast?'SUHOOR: 1.5L+ WATER':'3.5L+ WATER DAILY'}</div>
<p style="font-size:11px;color:#666;margin-top:3px">${isFast?'Front-load all hydration before dawn':'Extra in Abu Dhabi heat + training days'}</p>
</div>

<p class="st" style="color:${c.p};margin-top:20px">🔄 SUPPLEMENT PROTOCOL</p>
<div class="ac" style="line-height:1.7;font-size:12px;color:#999">
<span style="color:#0F8;font-weight:700">AFTER BREAKFAST:</span> Multivitamin only (covers zinc 15mg + Vit C 500mg + B vitamins)<br><br>
<span style="color:#0F8;font-weight:700">AFTER LUNCH:</span> Fish Oil 2-3g + Vitamin D3 10,000 IU (${p===1?'every other day':'every 3rd day'}) ${p===1?'+ CLA Keto Cut (Phase 1 only)':''}<br><br>
<span style="color:#FFD700;font-weight:700">PRE-GYM:</span> Super Burner 2 caps (gym days only). Cycle: 6 wk ON → 1 wk OFF.<br><br>
<span style="color:#0F8;font-weight:700">POST-GYM:</span> Creatine 5g + Whey (if needed) — daily forever<br><br>
<span style="color:#0F8;font-weight:700">BEDTIME:</span> Magnesium 400mg ONLY — no other minerals, clean absorption<br><br>
<span style="color:#0F8;font-weight:700">DROPPED:</span> Separate zinc (multi has 15mg), separate Vit C (multi has 500mg), casein (yogurt replaces it)${p>=2?', CLA Keto Cut (finished in Phase 1)':''}
</div>

${!isFast&&!isGym?`<div class="nb" style="border-color:var(--p);background:rgba(0,255,135,.04);margin-top:10px">📋 <b>Rest day:</b> No Super Burner. Multi after breakfast, Fish Oil + D3 after lunch, Creatine with dinner, Magnesium at bedtime. Simple.</div>`:''}
`;}


function rP(c){return`<p class="st" style="color:${c.p};margin-top:0">📈 LOG</p><p style="font-size:11px;color:#444;margin-bottom:10px">Weekly: same day, morning, fasted</p>
<div class="lr"><input class="li" id="lw" type="number" inputmode="decimal" placeholder="Weight (kg)"><input class="li" id="lb" type="number" inputmode="decimal" placeholder="BF %">
<button style="padding:10px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;background:${c.p};color:#000;cursor:pointer" onclick="addLog()">Log</button></div>
${LOG.length?`<p class="st" style="color:${c.p}">HISTORY</p>${LOG.slice().reverse().map(l=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #0a0a0a;font-size:13px"><span style="color:#555">Wk ${l.wk}</span><span><b>${l.w}kg</b></span><span style="color:#888">${l.bf?l.bf+'%':''}</span></div>`).join('')}`:''}
<p class="st" style="color:${c.p};margin-top:20px">🎯 MILESTONES</p><p style="font-size:11px;color:#444;margin-bottom:10px">Hit the target → earn the reward</p>
${MST.map(m=>{const dn=S.week>m.wk,cur=S.week>=m.wk-1&&S.week<=m.wk;
return`<div class="ms2${dn?' d':''}${cur?' c':''}"><div class="msl2"></div><div class="msc2">
<p style="font-size:11px;color:${cur?c.p:'#555'};font-weight:600">${cur?'→ ':dn?'✓ ':''}WEEK ${m.wk}</p>
<p style="font-size:13px;font-weight:700;margin-top:2px">${m.w}kg · ${m.bf}%</p>
<p style="font-size:11px;color:#666;margin-top:2px">${m.nt}</p>
${m.ch?`<div class="cheat"><p style="color:#FFD700;font-size:11px;font-weight:700">🎉 CHEAT MEAL EARNED</p><p style="font-size:13px;font-weight:700;margin-top:2px">${m.cr}</p><p style="font-size:11px;color:#888;margin-top:3px">Rules: normal meals all day, cheat = dinner only. Train that day. No sugary drinks. Don't weigh next morning — water retention spikes 1-2kg (normal).</p></div>`:''}</div></div>`}).join('')}`;}

function rSh(c){
const p=gph(S.week);
const curPhase=p===1?SHOP.ph1:p===2?SHOP.ph2:SHOP.ph3;
return`<p class="st" style="color:${c.p};margin-top:0">🛒 YOUR SHOPPING LIST</p>
<p style="font-size:11px;color:#444;margin-bottom:10px">Phase ${p} (Week ${S.week}) — buy weekly unless noted</p>

<div class="shop-cat" style="color:${c.p}">${SHOP.always.n}</div>
${SHOP.always.items.map(([n,q])=>`<div class="shop-item"><span>${n}</span><span class="shop-qty">${q}</span></div>`).join('')}

<div class="shop-cat" style="color:${PC[p].p};margin-top:16px">${curPhase.n}</div>
<p style="font-size:11px;color:#666;margin-bottom:6px">${curPhase.note}</p>
${curPhase.items.map(([n,q])=>`<div class="shop-item"><span>${n}</span><span class="shop-qty">${q}</span></div>`).join('')}

<div class="shop-cat" style="color:#b388ff;margin-top:16px">${SHOP.supps.n}</div>
${SHOP.supps.items.map(([n,q])=>`<div class="shop-item"><span>${n}</span><span class="shop-qty">${q}</span></div>`).join('')}
${SHOP.supps.note?`<p style="font-size:11px;color:#b388ff;margin-top:6px;font-style:italic">📌 ${SHOP.supps.note}</p>`:''}

${p<3?`<div class="nb" style="border-color:${c.p};background:${c.p}06;margin-top:16px">
📅 <b>Phase ${p+1} (Week ${p*8+1}):</b> You'll add ${p===1?'turkey, shrimp, fish, feta, pasta — more lean protein variety':'salmon, steak (1x/week each), electrolytes — peak performance fuel'}. Shopping list auto-updates when you advance.
</div>`:''}

<p class="st" style="color:#FF4757;margin-top:24px">🚫 NEVER BUY</p>
${AVOID.map(a=>`<div class="avoid-item"><p class="anm">${a.n}</p><p class="why">${a.w}</p></div>`).join('')}
<div class="nb" style="border-color:${c.p};background:${c.p}06;margin-top:16px">💡 Shop with a list, never hungry. Stick to perimeter of store. >5 ingredients on label? Skip it.</div>`;}

function rI(W,c,mp){return`<p class="st" style="color:${c.p};margin-top:0">📊 STATS</p>
<div class="ig"><div class="ic"><p class="iv" style="color:${c.p}">78<span>kg</span></p><p class="il">Start</p></div><div class="ic"><p class="iv" style="color:${c.p}">26<span>%</span></p><p class="il">Start BF</p></div><div class="ic"><p class="iv" style="color:${c.p}">67<span>kg</span></p><p class="il">Target</p></div><div class="ic"><p class="iv" style="color:${c.p}">10<span>%</span></p><p class="il">Target BF</p></div></div>
<p class="st" style="color:${c.p};margin-top:20px">📅 PHASES</p>
${ME.ph.map((p2,i)=>{const a=i+1===W.phase,cm=ME.ph.slice(0,i).reduce((s,x)=>s+x.wk,0);return`<div style="background:#0a0a0a;border:1px solid #151515;border-radius:13px;padding:13px;margin-bottom:7px;opacity:${a?1:.5};border-left:3px solid ${PC[i+1].p}"><div style="display:flex;justify-content:space-between"><p style="font-size:14px;font-weight:700;color:${PC[i+1].p}">PHASE ${i+1}: ${p2.n}</p>${a?`<span class="tg" style="background:${PC[i+1].p}20;color:${PC[i+1].p}">NOW</span>`:''}</div><p style="font-size:11px;color:#555;margin-top:2px">Wk ${cm+1}–${cm+p2.wk} · ${p2.cal} cal</p><p style="font-size:12px;color:#888;margin-top:4px">${p2.l} · P:${p2.p}g C:${p2.c}g F:${p2.f}g</p></div>`}).join('')}
<p class="st" style="color:${c.p};margin-top:20px">🏟️ CLASSES</p>
${[1,2,3].map(i=>{const cl=CLS[i];return`<div class="ac" style="${i===W.phase?`border-color:${c.p}30;background:${c.p}05`:'opacity:.5'}"><p style="font-size:13px;font-weight:700;color:${PC[i].p}">Phase ${i}${i===W.phase?' (NOW)':''}</p><p style="font-size:12px;color:#888;margin-top:4px">${cl.note}</p></div>`}).join('')}
<p class="st" style="color:${c.p};margin-top:20px">🏋️ SPLIT</p>
${DAYS.map((d,i)=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #0a0a0a"><span style="color:${c.p};font-size:12px;font-weight:700;min-width:72px">${d}</span><span style="font-size:12px;${W.days[i]?.ex?.length||W.days[i]?.rn?'color:#fff':'color:#333'}">${W.days[i]?.ic||''} ${W.days[i]?.nm||''}</span></div>`).join('')}
<p class="st" style="color:${c.p};margin-top:20px">⚡ RULES</p>
${["Progressive overload when you hit all reps","Workouts randomize weekly — no adaptation","Track weights, reps & how you felt","Sleep 7-9h — growth happens here","Weigh in weekly: same day, fasted","Progress photos every 2 weeks","Phase 3 refeeds: +400 carbs every 10-14 days","Miss a day? Continue — never double up","Run schedule: Wed + Sat + 1-2 optional mornings","Classes: Phase 2+ only, on conditioning day","Abu Dhabi: extra water + electrolytes always","Super Burner = pre-workout (gym days). CLA = Phase 1 breakfast only"].map((r,i)=>`<div style="padding:7px 0;border-bottom:1px solid #0a0a0a;display:flex;gap:7px"><span style="color:${c.p};font-weight:700;min-width:18px">${i+1}.</span><span style="font-size:12px;line-height:1.5">${r}</span></div>`).join('')}
<p class="st" style="color:${c.p};margin-top:28px">🏆 AFTER WEEK 24 — MAINTENANCE</p>
<div class="maint"><h4>Calories: ${MAINT.cal}/day</h4><p>Back to maintenance. No deficit. P:${MAINT.p}g C:${MAINT.c}g F:${MAINT.f}g</p></div>
<div class="maint"><h4>${MAINT.train}</h4><p>Drop to 4 days. Volume -20%. Keep intensity high.</p></div>
<div class="maint"><h4>${MAINT.cardio}</h4><p>Run for enjoyment. Maintain 10K ability. Daily walks.</p></div>
<div class="maint"><h4>Life Rules</h4><p>${MAINT.rules.map((r,i)=>`${i+1}. ${r}`).join('<br>')}</p></div>
<div class="nb" style="border-color:${c.p};background:${c.p}06;margin-top:16px">🎯 <b>78kg@26% → 67kg@10%</b> in 24 weeks. Visible 6-pack, vascular arms, shoulder caps, a body that turns heads. Every rep counts, Hashem.</div>
<button class="rb" onclick="if(confirm('Reset all progress?')){LOG=[];S.week=1;save();render()}">🔄 Reset</button>`;}

function addLog(){const w=parseFloat(document.getElementById('lw')?.value),b=parseFloat(document.getElementById('lb')?.value);if(!w)return;LOG.push({wk:S.week,w,bf:b||null});save();render();}
render();
</script>
