<span style="color:#FFD700;font-weight:700">CYCLE CAFFEINE:</span> Pre-workout — 6-8 weeks ON → 1 week OFF. Training days only. Off-week feels sluggish, push through.<br><br>
<span style="color:#FFD700;font-weight:700">LAPERVA SUPER BURNER:</span> Use on REST days only as morning energy (contains ~100mg caffeine). Never stack with pre-workout.<br><br>
<span style="color:#FFD700;font-weight:700">LAPERVA CLA:</span> Daily with lunch until bottle runs out. Don't rebuy — the deficit does the real work.<br><br>
<span style="color:#FF4757;font-weight:700">⚠️ MAX CAFFEINE:</span> Under 300mg/day total. Pre-workout (~200mg) OR Super Burner (~100mg) — never both.
</div>

${!isFast&&!isGym?`<div class="nb" style="border-color:var(--p);background:rgba(0,255,135,.04);margin-top:10px">📋 <b>Rest day swap:</b> Skip pre-workout supp. Take Super Burner at breakfast instead for energy. Creatine moves to dinner. Everything else stays the same.</div>`:''}
`;}


function rR(wk,c){const rp=getRn(wk);return`<p class="st" style="color:${c.p};margin-top:0">🏃 5K → 10K</p>
<div class="rc"><p style="color:#09F;font-size:11px;font-weight:700;letter-spacing:1px">THIS WEEK</p><h4 style="font-size:16px;font-weight:800;margin-top:3px">${rp.t}</h4><p style="font-size:13px;color:#999;margin-top:4px">${rp.p}</p><div class="rs"><div><p style="font-size:16px;font-weight:800;color:#09F">${rp.tg}</p><p style="font-size:9px;color:#666;margin-top:2px">Target</p></div><div><p style="font-size:16px;font-weight:800;color:#09F">${wk<=8?'6:00+':wk<=16?'5:30':'5:00'}</p><p style="font-size:9px;color:#666;margin-top:2px">min/km</p></div></div><p style="font-size:12px;color:#666;margin-top:10px;font-style:italic">💡 ${rp.nt}</p></div>
<div class="nb" style="border-color:#09F;background:rgba(0,153,255,.04);margin-top:0;margin-bottom:12px">📅 <b>When to run (4 sessions/week):</b><br>• <b>Wed:</b> Recovery day easy run (3-4km, conversational pace) — no gym<br>• <b>Sat:</b> Main run day — your longest/hardest run of the week<br>• <b>Tue + Fri MORNING (optional):</b> Easy 3km jog BEFORE your afternoon gym session — wake 30 min early<br>• Gym cardio (incline walk, HIIT) is AFTER lifting — that's separate from running<br>• <b>NEVER</b> run hard the day before Leg Day (Thu)</div>
<p class="st" style="color:${c.p}">FULL PLAN</p>${RN.map(r=>{const cur=wk>=r.wk[0]&&wk<=r.wk[1],dn=wk>r.wk[1];return`<div class="ac" style="${cur?`border-color:${c.p}30;background:${c.p}05`:dn?'opacity:.4':''}"><div style="display:flex;justify-content:space-between"><div><span style="font-size:12px;font-weight:700;${cur?`color:${c.p}`:'color:#555'}">Wk ${r.wk[0]}-${r.wk[1]}</span><span style="font-size:13px;font-weight:700;margin-left:8px">${r.t}</span></div>${cur?`<span class="tg tp">NOW</span>`:dn?'<span style="color:#333">✓</span>':''}</div><p style="font-size:12px;color:#666;margin-top:3px">${r.tg}</p></div>`}).join('')}`;}

function rP(c){return`<p class="st" style="color:${c.p};margin-top:0">📈 LOG</p><p style="font-size:11px;color:#444;margin-bottom:10px">Weekly: same day, morning, fasted</p>
<div class="lr"><input class="li" id="lw" type="number" inputmode="decimal" placeholder="Weight (kg)"><input class="li" id="lb" type="number" inputmode="decimal" placeholder="BF %">
<button style="padding:10px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;background:${c.p};color:#000;cursor:pointer" onclick="addLog()">Log</button></div>
${LOG.length?`<p class="st" style="color:${c.p}">HISTORY</p>${LOG.slice().reverse().map(l=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #0a0a0a;font-size:13px"><span style="color:#555">Wk ${l.wk}</span><span><b>${l.w}kg</b></span><span style="color:#888">${l.bf?l.bf+'%':''}</span></div>`).join('')}`:''}
<p class="st" style="color:${c.p};margin-top:20px">🎯 MILESTONES</p><p style="font-size:11px;color:#444;margin-bottom:10px">Hit the target → earn the reward</p>
${MST.map(m=>{const dn=S.week>m.wk,cur=S.week>=m.wk-1&&S.week<=m.wk;
return`<div class="ms2${dn?' d':''}${cur?' c':''}"><div class="msl2"></div><div class="msc2">
<p style="font-size:11px;color:${cur?c.p:'#555'};font-weight:600">${cur?'→ ':dn?'✓ ':''}WEEK ${m.wk}</p>
<p style="font-size:13px;font-weight:700;margin-top:2px">${m.w}kg · ${m.bf}%</p>
<p style="font-size:11px;color:#666;margin-top:2px">${m.nt}</p>
${m.ch?`<div class="cheat"><p style="color:#FFD700;font-size:11px;font-weight:700">🎉 CHEAT MEAL EARNED</p><p style="font-size:13px;font-weight:700;margin-top:2px">${m.cr}</p><p style="font-size:11px;color:#888;margin-top:3px">Rules: normal meals all day, cheat = dinner only. Train that day. No sugary drinks. Don't weigh next morning — water retention spikes 1-2kg (normal).</p></div>`:''}</div></div>`}).join('')}`;}

function rSh(c){return`<p class="st" style="color:${c.p};margin-top:0">🛒 SHOPPING LIST</p><p style="font-size:11px;color:#444;margin-bottom:6px">Keep stocked — never miss a meal</p>
${Object.entries(SHOP).map(([cat,items])=>`<div class="shop-cat" style="color:${c.p}">${cat}</div>${items.map(([n,q])=>`<div class="shop-item"><span>${n}</span><span class="shop-qty">${q}</span></div>`).join('')}`).join('')}
<p class="st" style="color:#FF4757;margin-top:24px">🚫 NEVER BUY</p>
${AVOID.map(a=>`<div class="avoid-item"><p class="anm">${a.n}</p><p class="why">${a.w}</p></div>`).join('')}
<div class="nb" style="border-color:${c.p};background:${c.p}06;margin-top:16px">💡 <b>Pro tip:</b> Shop with a list, never hungry. Stick to perimeter of store (fresh food). >5 ingredients on label? Skip it.</div>`;}

function rI(W,c,mp){return`<p class="st" style="color:${c.p};margin-top:0">📊 STATS</p>
<div class="ig"><div class="ic"><p class="iv" style="color:${c.p}">77<span>kg</span></p><p class="il">Start</p></div><div class="ic"><p class="iv" style="color:${c.p}">26<span>%</span></p><p class="il">Start BF</p></div><div class="ic"><p class="iv" style="color:${c.p}">67<span>kg</span></p><p class="il">Target</p></div><div class="ic"><p class="iv" style="color:${c.p}">10<span>%</span></p><p class="il">Target BF</p></div></div>
<p class="st" style="color:${c.p};margin-top:20px">📅 PHASES</p>
${ME.ph.map((p2,i)=>{const a=i+1===W.phase,cm=ME.ph.slice(0,i).reduce((s,x)=>s+x.wk,0);return`<div style="background:#0a0a0a;border:1px solid #151515;border-radius:13px;padding:13px;margin-bottom:7px;opacity:${a?1:.5};border-left:3px solid ${PC[i+1].p}"><div style="display:flex;justify-content:space-between"><p style="font-size:14px;font-weight:700;color:${PC[i+1].p}">PHASE ${i+1}: ${p2.n}</p>${a?`<span class="tg" style="background:${PC[i+1].p}20;color:${PC[i+1].p}">NOW</span>`:''}</div><p style="font-size:11px;color:#555;margin-top:2px">Wk ${cm+1}–${cm+p2.wk} · ${p2.cal} cal</p><p style="font-size:12px;color:#888;margin-top:4px">${p2.l} · P:${p2.p}g C:${p2.c}g F:${p2.f}g</p></div>`}).join('')}
<p class="st" style="color:${c.p};margin-top:20px">🏟️ CLASSES</p>
${[1,2,3].map(i=>{const cl=CLS[i];return`<div class="ac" style="${i===W.phase?`border-color:${c.p}30;background:${c.p}05`:'opacity:.5'}"><p style="font-size:13px;font-weight:700;color:${PC[i].p}">Phase ${i}${i===W.phase?' (NOW)':''}</p><p style="font-size:12px;color:#888;margin-top:4px">${cl.note}</p></div>`}).join('')}
<p class="st" style="color:${c.p};margin-top:20px">🏋️ SPLIT</p>
${DAYS.map((d,i)=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #0a0a0a"><span style="color:${c.p};font-size:12px;font-weight:700;min-width:72px">${d}</span><span style="font-size:12px;${W.days[i]?.ex?.length||W.days[i]?.rn?'color:#fff':'color:#333'}">${W.days[i]?.ic||''} ${W.days[i]?.nm||''}</span></div>`).join('')}
<p class="st" style="color:${c.p};margin-top:20px">⚡ RULES</p>
${["Progressive overload when you hit all reps","Workouts randomize weekly — no adaptation","Track weights, reps & how you felt","Sleep 7-9h — growth happens here","Weigh in weekly: same day, fasted","Progress photos every 2 weeks","Phase 3 refeeds: +400 carbs every 10-14 days","Miss a day? Continue — never double up","Run schedule: Wed + Sat + 1-2 optional mornings","Classes: Phase 2+ only, on conditioning day","Abu Dhabi: extra water + electrolytes always","Super Burner on rest days, Pre-workout on gym days"].map((r,i)=>`<div style="padding:7px 0;border-bottom:1px solid #0a0a0a;display:flex;gap:7px"><span style="color:${c.p};font-weight:700;min-width:18px">${i+1}.</span><span style="font-size:12px;line-height:1.5">${r}</span></div>`).join('')}
<p class="st" style="color:${c.p};margin-top:28px">🏆 AFTER WEEK 24 — MAINTENANCE</p>
<div class="maint"><h4>Calories: ${MAINT.cal}/day</h4><p>Back to maintenance. No deficit. P:${MAINT.p}g C:${MAINT.c}g F:${MAINT.f}g</p></div>
<div class="maint"><h4>${MAINT.train}</h4><p>Drop to 4 days. Volume -20%. Keep intensity high.</p></div>
<div class="maint"><h4>${MAINT.cardio}</h4><p>Run for enjoyment. Maintain 10K ability. Daily walks.</p></div>
<div class="maint"><h4>Life Rules</h4><p>${MAINT.rules.map((r,i)=>`${i+1}. ${r}`).join('<br>')}</p></div>
<div class="nb" style="border-color:${c.p};background:${c.p}06;margin-top:16px">🎯 <b>77kg@26% → 67kg@10%</b> in 24 weeks. Visible 6-pack, vascular arms, shoulder caps, a body that turns heads. Every rep counts, Hashem.</div>
<button class="rb" onclick="if(confirm('Reset all progress?')){LOG=[];S.week=1;save();render()}">🔄 Reset</button>`;}

function addLog(){const w=parseFloat(document.getElementById('lw')?.value),b=parseFloat(document.getElementById('lb')?.value);if(!w)return;LOG.push({wk:S.week,w,bf:b||null});save();render();}
render();
</script>
</body>
</html>
