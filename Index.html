.day-btn{flex:0 0 auto;padding:8px 12px;border-radius:10px;border:none;background:#111;color:#888;font-size:11px;font-weight:500;cursor:pointer;text-align:center;min-width:48px;transition:all .2s}
.day-btn.act{background:var(--pri);color:#000;font-weight:800}

const COLORS={

};

// ─── GENERATE WEEK ──────────────────────────────────────────────────
function genWeek(wk){
const phase=wk<=8?1:wk<=16?2:3;
const r=rng(wk*7919+42);
const sc=REPS[phase];
const ps=()=>sc[Math.floor(r()*sc.length)];
const mk=(ex,ov)=>({...ex,...(ov||ps())});

const cc=pick(EX.chestCompound,2,r),ci=pick(EX.chestIso,1,r),sp=pick(EX.shoulderPress,1,r);
const sl=pick(EX.shoulderLateral,1,r),sr=pick(EX.shoulderRear,1,r),tr=pick(EX.triceps,2,r);
const push={name:"PUSH DAY",sub:"Chest \u00b7 Shoulders \u00b7 Triceps",ico:"\ud83d\udcaa",
ex:[mk(cc[0],{...ps(),note:"2 warm-up sets first"}),mk(cc[1]),mk(ci[0]),mk(sp[0]),
mk(sl[0],{s:4,r:"12-15",rest:"45s",l:"Mind-Muscle"}),mk(sr[0]),mk(tr[0]),mk(tr[1])],
fin:phase>=2?"Burnout: 3\u00d715 push-ups + 3\u00d715 light lateral raises, 30s rest":null,
cardio:"15 min incline treadmill walk (10-12% incline, 5.5 km/h)"};

const bv=pick(EX.backVertical,1,r),bh=pick(EX.backHorizontal,2,r),bi=pick(EX.backIso,1,r);
const bc=pick(EX.biceps,2,r),sr2=pick(EX.shoulderRear,1,r);
const pull={name:"PULL DAY",sub:"Back \u00b7 Biceps \u00b7 Rear Delts",ico:"\ud83c\udfcb\ufe0f",
ex:[mk(bv[0],{...ps(),note:"Full stretch at bottom"}),mk(bh[0]),mk(bh[1]),mk(bi[0]),
mk(sr2[0],{s:4,r:"12-15",rest:"45s",l:"Squeeze & Hold"}),mk(bc[0]),mk(bc[1])],
fin:phase>=2?"Burnout: 3 sets max pull-ups + 21s bicep curl (7-7-7)":null,
cardio:"15 min stairmaster or rowing machine"};

const rest={name:"ACTIVE RECOVERY",sub:"Rest \u00b7 Stretch \u00b7 Light Cardio",ico:"\ud83e\uddd8",ex:[],
act:["20-30 min light walk or cycling","Full body stretching / yoga flow (15-20 min)",
"Foam rolling all major muscle groups","Optional: light swimming or sauna"]};

const qc=pick(EX.quadCompound,2,r),qi=pick(EX.quadIso,1,r),hm=pick(EX.hamstrings,2,r);
const gl=pick(EX.glutes,1,r),cl=pick(EX.calves,1,r),ab=pick(EX.abs,3,r);
const legs={name:"LEG DAY + ABS",sub:"Quads \u00b7 Hamstrings \u00b7 Glutes \u00b7 Core",ico:"\ud83e\uddb5",
ex:[mk(qc[0],{...ps(),note:"2 warm-up sets, go deep"}),mk(qc[1]),mk(qi[0]),mk(hm[0]),mk(hm[1]),
mk(gl[0]),mk(cl[0],{s:4,r:"15-20",rest:"45s",l:"Full ROM"}),
mk(ab[0],{s:3,r:"12-15",rest:"45s",l:"Core"}),mk(ab[1],{s:3,r:"12-15",rest:"45s",l:"Core"}),mk(ab[2],{s:3,r:"12-15",rest:"45s",l:"Core"})],
fin:phase>=2?"Burnout: Walking lunges 3\u00d720 steps + Wall sit 3\u00d745s":null};

const cc2=pick(EX.chestCompound,1,r),ci2=pick(EX.chestIso,1,r),bv2=pick(EX.backVertical,1,r);
const bh2=pick(EX.backHorizontal,1,r),sl2=pick(EX.shoulderLateral,1,r),sp2=pick(EX.shoulderPress,1,r);
const bc2=pick(EX.biceps,1,r),tr2=pick(EX.triceps,1,r),ab2=pick(EX.abs,2,r);
const upper={name:"UPPER HYPERTROPHY",sub:"Full Upper \u00b7 High Reps \u00b7 Supersets",ico:"\u26a1",
ex:[mk(cc2[0]),mk(bv2[0]),
{...mk(ci2[0],{s:3,r:"12-15",rest:"30s",l:"Superset A1"}),ss:true},
{...mk(bh2[0],{s:3,r:"12-15",rest:"60s",l:"Superset A2"}),ss:true},
mk(sp2[0]),mk(sl2[0],{s:4,r:"15-20",rest:"30s",l:"Pump"}),
{...mk(bc2[0],{s:3,r:"12-15",rest:"30s",l:"Superset B1"}),ss:true},
{...mk(tr2[0],{s:3,r:"12-15",rest:"60s",l:"Superset B2"}),ss:true},
mk(ab2[0],{s:3,r:"12-15",rest:"45s",l:"Core"}),mk(ab2[1],{s:3,r:"12-15",rest:"45s",l:"Core"})],
fin:phase>=2?"Giant Set: 10 push-ups + 10 curls + 10 lateral raises \u00d7 3 rounds, no rest":null,
cardio:"10 min HIIT: 20s sprint / 40s walk on treadmill"};

const cls=["BODYCOMBAT","BODYPUMP","RPM / Cycling"][Math.floor(r()*3)];
const clsInfo=cls==="BODYCOMBAT"?"60 min \u2014 martial arts cardio, burns 500-700 cal":
cls==="BODYPUMP"?"60 min \u2014 barbell strength endurance, full body":
"45 min \u2014 indoor cycling, high intensity intervals";
const abPost=pick(EX.abs,3,r).map(e=>mk(e,{s:3,r:"15-20",rest:"30s",l:"Core Finisher"}));
const cond={name:"CONDITIONING",sub:cls+" + Core",ico:"\ud83d\udd25",ex:[],cls,clsInfo,post:abPost,
cardio:cls!=="RPM / Cycling"?"Post-class: 20 min steady-state cardio":"Class covers cardio \u2014 just do core work after"};

const fullRest={name:"FULL REST",sub:"Recovery \u00b7 Sleep \u00b7 Hydrate",ico:"\ud83d\ude34",ex:[],
act:["Complete rest \u2014 no training","Focus on sleep (7-9 hours)","Drink 3-4L water",
"Meal prep for the week ahead","Light stretching if feeling stiff"]};

return{wk,phase,days:[push,pull,rest,legs,upper,cond,fullRest]};
}

// ─── RENDER ─────────────────────────────────────────────────────────
function render(){
const W=genWeek(S.week);
const phase=W.phase;
const c=COLORS[phase];
const mp=MEALS[phase];
const day=W.days[S.day];
const phLabel=phase===1?"FOUNDATION":phase===2?"SHRED":"PEAK";
const phWeek=phase===1?S.week:phase===2?S.week-8:S.week-16;

// Apply phase colors as CSS variables
document.documentElement.style.setProperty('--pri',c.pri);
document.documentElement.style.setProperty('--bg',c.bg);
document.documentElement.style.setProperty('--card',c.card);
document.documentElement.style.setProperty('--acc',c.acc);

let html=`
<div class="header">
<div class="phase-tag">PHASE ${phase} — ${phLabel}</div>
<h1 class="week-title">Week ${S.week} <span>of 24</span></h1>
<p class="week-sub">Phase week ${phWeek}/8 · ${mp.cal} cal/day · ${mp.label}</p>
<div class="prog-bar"><div class="prog-fill" style="width:${(S.week/24)*100}%"></div></div>
</div>
<div class="week-nav">
<button class="week-btn" ${S.week<=1?'disabled':''} onclick="S.week=Math.max(1,S.week-1);S.expanded=null;render()">◀ Prev</button>
<span style="color:#666;font-size:13px">Week ${S.week}</span>
<button class="week-btn" ${S.week>=24?'disabled':''} onclick="S.week=Math.min(24,S.week+1);S.expanded=null;render()">Next ▶</button>
</div>
<div class="day-sel">
${DAYS.map((d,i)=>`<button class="day-btn${S.day===i?' act':''}" onclick="S.day=${i};S.expanded=null;render()"><span class="ico">${W.days[i].ico}</span>${d.slice(0,3)}</button>`).join('')}
</div>
<div class="content">
<div class="day-head"><h2>${day.ico} ${day.name}</h2><p>${day.sub}</p></div>
`;

// TAB CONTENT
if(S.tab==='workout') html+=renderWorkout(day,phase,c);
else if(S.tab==='meals') html+=renderMeals(mp,c);
else if(S.tab==='supps') html+=renderSupps(c);
else html+=renderInfo(W,S.week,phase,c,mp);

html+=`</div>
<div class="tab-bar">
${[{id:'workout',ico:'🏋️',l:'Workout'},{id:'meals',ico:'🥩',l:'Meals'},{id:'supps',ico:'💊',l:'Supps'},{id:'info',ico:'📊',l:'Info'}]
.map(t=>`<button class="tab${S.tab===t.id?' act':''}" onclick="S.tab='${t.id}';render()"><span class="ico">${t.ico}</span>${t.l}</button>`).join('')}
</div>`;

$('app').innerHTML=html;
}

function renderWorkout(day,phase,c){
if(day.act) return `
<p class="section-title">${day.name==='FULL REST'?'📋 REST DAY CHECKLIST':'📋 RECOVERY PLAN'}</p>
${day.act.map(a=>`<div class="act-card">${a}</div>`).join('')}
<div class="note-bubble">${day.name==='FULL REST'?
'💤 Growth happens during rest. Your muscles recover and grow while you sleep. Aim for 7-9 hours tonight.':
'💡 Active recovery days accelerate results. Light movement increases blood flow and reduces soreness.'}</div>`;

const exercises=day.ex.length?day.ex:day.post||[];
let html='';

if(day.cls) html+=`
<div class="class-banner">
<p class="label">LES MILLS CLASS</p>
<h3>${day.cls}</h3>
<p>${day.clsInfo}</p>
</div>
${exercises.length?'<p class="section-title">POST-CLASS CORE WORK</p>':''}`;

html+=exercises.map((ex,i)=>{
const key=S.day+'-'+i;
const open=S.expanded===key;
return `
<div class="ex-card${open?' open':''}" onclick="S.expanded=S.expanded==='${key}'?null:'${key}';render()">
<div class="ex-top">
<div>
<p class="ex-name">${ex.name}${ex.ss?'<span class="ss-badge">SUPERSET</span>':''}</p>
<p class="ex-muscles">${ex.m}</p>
</div>
<span class="ex-arrow">▾</span>
</div>
<div class="ex-tags">
<span class="tag tag-pri">${ex.s} sets</span>
<span class="tag tag-yel">${ex.r} reps</span>
<span class="tag tag-blu">Rest ${ex.rest}</span>
</div>
<div class="ex-detail">
${ex.note?`<p class="ex-note">💡 ${ex.note}</p>`:''}
${ex.l?`<p class="ex-label">Style: ${ex.l}</p>`:''}
<a href="https://www.youtube.com/watch?v=${ex.yt}" target="_blank" rel="noopener" class="vid-btn" onclick="event.stopPropagation()">▶ Watch Demo</a>
</div>
</div>`;}).join('');

if(day.fin) html+=`
<div class="finisher">
<p class="label">🔥 FINISHER</p>
<p>${day.fin}</p>
</div>`;

if(day.cardio) html+=`

<p class="label">🏃 CARDIO</p>

</div>`;

return html;
}
